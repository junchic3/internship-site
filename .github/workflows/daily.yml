name: Daily Internship Update

on:
  schedule:
    - cron: '0 13 * * *'   # 每天 08:00 AM EST (UTC-5 = 13:00 UTC)
  workflow_dispatch:         # 允许手动点击运行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests "python-jobspy>=0.1.0" || pip install requests

      - name: Run scraper
        run: python scraper/fetch_jobs.py
        env:
          RAPIDAPI_KEY:    ${{ secrets.RAPIDAPI_KEY }}    # 可选
          ADZUNA_APP_ID:   ${{ secrets.ADZUNA_APP_ID }}   # 可选
          ADZUNA_APP_KEY:  ${{ secrets.ADZUNA_APP_KEY }}  # 可选

      - name: Commit & push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update internship listings ${{ github.run_id }}"
          file_pattern: data/jobs.json
